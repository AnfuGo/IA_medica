<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assistente Médico IoT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Assistente Médico (Debug + Teste)</h1>

<div class="box">
  <h2>Nova Consulta</h2>
  <textarea id="inputPergunta" placeholder="Digite a pergunta..."></textarea>
  <button onclick="enviarPergunta()">Enviar</button>
</div>

<div class="box">
  <h2>Resposta</h2>
  <p><strong>Pergunta:</strong> <span id="pergunta"></span></p>
  <p><strong>Resposta IA:</strong> <span id="resposta"></span></p>

  <audio id="audioPlayer" controls></audio>
</div>

<div class="box">
  <h2>Consultas Salvas</h2>
  <ul id="listaConsultas"></ul>
</div>

<div class="box">
  <h2>PDF da Consulta</h2>
  <iframe id="pdfViewer" width="100%" height="500px"></iframe>
</div>

<script src="app.js"></script>

</body>
</html>
