<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assistente Médico IoT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🩺 Assistente Médico IoT</h1>
  <p class="subtitle">Interface de teste, debug e consultas</p>
</header>

<main class="container">

  <!-- COLUNA ESQUERDA -->
  <section class="left">

    <div class="card">
      <h2>💬 Nova Consulta</h2>
      <textarea id="inputPergunta" placeholder="Digite sintomas ou pergunta..."></textarea>
      <button onclick="enviarPergunta()">Enviar Consulta</button>
    </div>

    <div class="card">
      <h2>📜 Histórico</h2>
      <ul id="listaConsultas"></ul>
    </div>

  </section>

  <!-- COLUNA DIREITA -->
  <section class="right">

    <div class="card">
      <h2>🤖 Resposta</h2>

      <div class="chat">
        <div class="msg user">
          <strong>Você:</strong>
          <p id="pergunta">---</p>
        </div>

        <div class="msg bot">
          <strong>IA:</strong>
          <p id="resposta">Aguardando resposta...</p>
        </div>
      </div>

      <audio id="audioPlayer" controls></audio>

    </div>

    <div class="card">
      <h2>📄 PDF da Consulta</h2>
      <iframe id="pdfViewer"></iframe>
    </div>

  </section>

</main>

<footer>
  <p>Modo Debug • ESP32 + Backend + IA</p>
</footer>

<script src="app.js"></script>

</body>
</html>
